[database]
; Default: database beside the EXE/source folder.
; For the shared drive setup, set this to the shared UNC/static path.
; Example: path = \\SERVER\Share\PIG_Portal\data\pig_portal.db
path = data\pig_portal.db

[app]
; 127.0.0.1 means only the user's own machine can access their local app instance.
host = 127.0.0.1
; 0 means pick an open port automatically so multiple users/multiple launches avoid port conflicts.
port = 0
auto_open_browser = yes
; How long a user waits if another user's EXE is currently writing to the shared DB.
lock_timeout_seconds = 60
; If an EXE crashes while holding the lock, the next user can clear it after this many minutes.
stale_lock_minutes = 10
backup_dir = backups
; Optional local app password. Leave blank for no password.
password =

[security]
frame_ancestors = 'self'
